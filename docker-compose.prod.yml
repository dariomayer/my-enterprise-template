version: '3.8'

services:
  web:
    build:
      context: ./
      dockerfile: apps/web/Dockerfile
    ports:
      - "80:80"
    restart: always
    depends_on:
      - api

  api:
    build:
      context: ./
      dockerfile: apps/api/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-password}@db:5432/enterprise_prod
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGIN=${CORS_ORIGIN:-https://yourdomain.com}
      - PORT=3000
    restart: always
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: enterprise_prod
    # Security: NO ports exposed to the host — only reachable from the api service
    # ports:
    #   - "5432:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data_prod:
